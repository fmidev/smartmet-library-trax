<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" width="360" height="240">
<style>
  .lbl   { font: bold 14px sans-serif; fill: white;   text-anchor: middle; dominant-baseline: middle }
  .clbl  { font: bold 12px sans-serif; fill: #1f2937; text-anchor: middle }
  .ann   { font: 11px sans-serif;      fill: #374151; text-anchor: middle }
  .annl  { font: 11px sans-serif;      fill: #374151 }
</style>
<rect width="360" height="240" fill="white"/>
<rect x="100" y="40" width="160" height="160" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
<circle cx="100" cy="200" r="13" fill="#3b82f6" stroke="white" stroke-width="2.5"/>
<text x="100" y="201" class="lbl">B</text>
<circle cx="100" cy="40" r="13" fill="#10b981" stroke="white" stroke-width="2.5"/>
<text x="100" y="41" class="lbl">I</text>
<circle cx="260" cy="40" r="13" fill="#ef4444" stroke="white" stroke-width="2.5"/>
<text x="260" y="41" class="lbl">A</text>
<circle cx="260" cy="200" r="13" fill="#9ca3af" stroke="white" stroke-width="2.5"/>
<text x="260" y="201" class="lbl">N</text>
<text x="78" y="205" class="annl" text-anchor="end">v &lt; lo</text>
<text x="78" y="45" class="annl" text-anchor="end">lo ≤ v &lt; hi</text>
<text x="282" y="45" class="annl">v ≥ hi</text>
<text x="282" y="205" class="annl">v is NaN</text>
</svg>
